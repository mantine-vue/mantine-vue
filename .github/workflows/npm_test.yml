name: Pull request workflow
permissions:
  contents: read

on:
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  test_pull_request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Enable Corepack (so Yarn resolves to the pinned packageManager version)
        run: corepack enable
      - name: Resolve Yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build all packages (esm/cjs/types)
        run: yarn build
      - name: Run full test suite
        run: yarn test:all
      - name: Validate build outputs match package.json exports
        run: yarn test:exports
      - name: Validate npm pack would include the declared build output
        run: yarn test:pack
      - name: Build docs site
        run: yarn docs:build
